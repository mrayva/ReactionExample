name: Sanitizers

on:
  push:
  pull_request:

jobs:
  sanitizer:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: tsan
            compiler: clang++
            c_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            cxx_flags: "-fsanitize=thread -fno-omit-frame-pointer"
            linker_flags: "-fsanitize=thread"
          - name: asan_ubsan
            compiler: clang++
            c_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            cxx_flags: "-fsanitize=address,undefined -fno-omit-frame-pointer"
            linker_flags: "-fsanitize=address,undefined"

    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build zip unzip tar pkg-config

      - name: Setup vcpkg
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$GITHUB_WORKSPACE/vcpkg"
          "$GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh"

      - name: Configure
        run: |
          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=${{ matrix.compiler }} \
            -DCMAKE_TOOLCHAIN_FILE="$GITHUB_WORKSPACE/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DCMAKE_C_FLAGS="${{ matrix.c_flags }}" \
            -DCMAKE_CXX_FLAGS="${{ matrix.cxx_flags }}" \
            -DCMAKE_EXE_LINKER_FLAGS="${{ matrix.linker_flags }}" \
            -DCMAKE_SHARED_LINKER_FLAGS="${{ matrix.linker_flags }}"

      - name: Build
        run: cmake --build build -j2

      - name: Test
        run: ctest --test-dir build --output-on-failure
